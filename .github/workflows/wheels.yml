name: Build and Upload Wheels

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Setup MSYS2 for Windows to get g++ and unix tools
      - name: Setup MSYS2
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-libsodium
            mingw-w64-x86_64-protobuf
            mingw-w64-x86_64-python
            mingw-w64-x86_64-libevent
            mingw-w64-x86_64-nettle
            mingw-w64-x86_64-gnutls
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-libidn2
            mingw-w64-x86_64-libunistring
            mingw-w64-x86_64-libtasn1
            mingw-w64-x86_64-libiconv
            mingw-w64-x86_64-zstd
            pkg-config

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_BEFORE_ALL_LINUX: >
            (if command -v dnf; then
              dnf install -y epel-release &&
              (dnf config-manager --set-enabled powertools || dnf config-manager --set-enabled crb || true) &&
              dnf install -y protobuf-devel curl-devel openssl-devel nettle-devel gmp-devel libev-devel libsodium-devel libzstd-devel pkgconfig;
            elif command -v yum; then 
              yum install -y epel-release &&
              yum install -y 'dnf-command(config-manager)' &&
              (yum config-manager --set-enabled powertools || yum config-manager --set-enabled crb || true) &&
              yum install -y protobuf-devel curl-devel openssl-devel nettle-devel gmp-devel libev-devel libsodium-devel libzstd-devel pkgconfig;
            elif command -v apt-get; then
              apt-get update && apt-get install -y libprotobuf-dev protobuf-compiler libcurl4-openssl-dev libssl-dev libnettle-dev libgmp-dev libev-dev libsodium-dev libzstd-dev pkg-config;
            fi) &&
            SAF_USE_SYSTEM_DEPS=ON SAF_SKIP_MAIN_BUILD=ON SAF_ENABLE_ONION=OFF bash build.sh
          CIBW_ENVIRONMENT_LINUX: "SKBUILD_CMAKE_ARGS='-DSAF_ENABLE_ONION=OFF -DSAF_BUILD_PYTHON=ON'"
          CIBW_BEFORE_ALL_MACOS: >
            brew install openssl libsodium curl protobuf nettle gmp libev zstd pkg-config &&
            SAF_USE_SYSTEM_DEPS=ON SAF_SKIP_MAIN_BUILD=ON SAF_ENABLE_ONION=OFF bash build.sh
          CIBW_ENVIRONMENT_MACOS: "SKBUILD_CMAKE_ARGS='-DSAF_ENABLE_ONION=OFF -DSAF_BUILD_PYTHON=ON'"
          CIBW_BEFORE_ALL_WINDOWS: "msys2 -c 'SAF_USE_SYSTEM_DEPS=ON SAF_SKIP_MAIN_BUILD=ON SAF_ENABLE_ONION=OFF ./build.sh'"
          CIBW_ENVIRONMENT_WINDOWS: "CC=gcc CXX=g++ CMAKE_GENERATOR=Ninja SKBUILD_CMAKE_ARGS='-DSAF_ENABLE_ONION=OFF -DSAF_BUILD_PYTHON=ON'"
          CIBW_BUILD_VERBOSITY: 1
          CIBW_TEST_COMMAND: "python -c \"import session_saf; print('Success')\""

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  upload_pypi:
    needs: [build_wheels]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-wheels-*
          path: dist
          merge-artifacts: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
